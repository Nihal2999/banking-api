stages:
  - test
  - build

variables:
  DATABASE_URL: "postgresql://postgres:password@postgres:5432/banking_db_test"
  REDIS_URL: "redis://redis:6379/0"
  RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672//"
  SECRET_KEY: "test-secret-key-for-ci"
  JWT_SECRET_KEY: "test-jwt-secret-key-for-ci"
  DEBUG: "True"

test:
  stage: test
  image: python:3.12-slim
  services:
    - name: postgres:15
      alias: postgres
      variables:
        POSTGRES_DB: banking_db_test
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: password
    - name: redis:7
      alias: redis
    - name: rabbitmq:3-management
      alias: rabbitmq
  before_script:
    - pip install -r requirements.txt
  script:
    - python manage.py migrate
    - python manage.py test
  only:
    - main
    - merge_requests

build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker info
  script:
    - docker build -t banking-api:$CI_COMMIT_SHORT_SHA .
    - echo "Docker build successful"
  only:
    - main